name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: |
          pnpm prisma generate --schema=apps/files/src/prisma/schema.prisma
          pnpm prisma generate --schema=apps/auth/src/prisma/schema.prisma

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: |
          pnpm prisma generate --schema=apps/files/src/prisma/schema.prisma
          pnpm prisma generate --schema=apps/auth/src/prisma/schema.prisma

      - name: Run unit tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: |
          pnpm prisma generate --schema=apps/files/src/prisma/schema.prisma
          pnpm prisma generate --schema=apps/auth/src/prisma/schema.prisma

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, build]
    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v3

      - name: Write .env files from secrets
        run: |
          echo "${{ secrets.AUTH_ENV_TEST }}" > apps/auth/.env.test
          echo "${{ secrets.AUTH_ENV_TEST }}" > apps/auth/.env

          echo "${{ secrets.FILES_ENV_TEST }}" > apps/files/.env.test
          echo "${{ secrets.FILES_ENV_TEST }}" > apps/files/.env

          echo "${{ secrets.API_GATEWAY_ENV_TEST }}" > apps/api-gateway/.env.test
          echo "${{ secrets.API_GATEWAY_ENV_TEST }}" > apps/api-gateway/.env

          echo "${{ secrets.ANTIVIRUS_ENV_TEST }}" > apps/antivirus/.env.test
          echo "${{ secrets.ANTIVIRUS_ENV_TEST }}" > apps/antivirus/.env

          echo "${{ secrets.NOTIFICATIONS_ENV_TEST }}" > apps/notifications/.env.test
          echo "${{ secrets.NOTIFICATIONS_ENV_TEST }}" > apps/notifications/.env

          echo "${{ secrets.ENV_TEST }}" > .env.test
          echo "${{ secrets.ENV_TEST }}" > .env

      - name: Run docker compose
        run: docker compose -f docker-compose.e2e.yaml up --build -d --wait

      - name: Run migrations
        run: |
          docker exec vaulted-api-gateway-test sh -c "set -a && source apps/files/.env.test && pnpm prisma db push --schema=apps/files/src/prisma/schema.prisma"
          docker exec vaulted-api-gateway-test sh -c "set -a && source apps/auth/.env.test && pnpm prisma db push --schema=apps/auth/src/prisma/schema.prisma"

      - name: Run e2e tests
        run: docker exec vaulted-api-gateway-test pnpm test:e2e

      - name: Show docker logs
        if: failure()
        run: docker compose logs

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check commit messages
        run: pnpm commitlint --from=origin/main --to=HEAD
