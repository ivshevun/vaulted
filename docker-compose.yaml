services:
  api-gateway:
    restart: unless-stopped
    container_name: vaulted-api-gateway
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    env_file:
      - apps/api-gateway/.env
    ports:
      - '3001:3001'
    volumes:
      - ./apps:/usr/src/app/apps
      - ./libs:/usr/src/app/libs
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres-auth:
        condition: service_healthy
      postgres-files:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  auth:
    restart: unless-stopped
    container_name: vaulted-auth
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./apps/auth/Dockerfile
    env_file:
      - apps/auth/.env
    ports:
      - '3002:3002'
    volumes:
      - ./apps/auth:/usr/src/app/apps/auth
      - ./libs:/usr/src/app/libs
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3002/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  files:
    restart: unless-stopped
    container_name: vaulted-files
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./apps/files/Dockerfile
    env_file:
      - apps/files/.env
    ports:
      - '3003:3003'
    volumes:
      - ./apps/files:/usr/src/app/apps/files
      - ./libs:/usr/src/app/libs
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3003/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres-files:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  antivirus:
    restart: unless-stopped
    container_name: vaulted-antivirus
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./apps/antivirus/Dockerfile
    env_file:
      - apps/antivirus/.env
    ports:
      - '3004:3004'
    volumes:
      - ./apps/antivirus:/usr/src/app/apps/antivirus
      - ./libs:/usr/src/app/libs
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3004/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres-files:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      haproxy:
        condition: service_healthy
  notifications:
    restart: unless-stopped
    container_name: vaulted-notifications
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./apps/notifications/Dockerfile
    env_file:
      - apps/notifications/.env
    ports:
      - '5001:5001'
    volumes:
      - ./apps/notifications:/usr/src/app/apps/notifications
      - ./libs:/usr/src/app/libs
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:5001/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
  postgres-files:
    image: postgres:latest
    container_name: vaulted-postgres-files
    platform: linux/amd64
    env_file:
      - apps/files/.env
    environment:
      POSTGRES_USER: ${POSTGRES_FILES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_FILES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_FILES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - pgdata-files:/var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_FILES_USER} -d ${POSTGRES_FILES_DB}',
        ]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    tty: true
    stdin_open: true
  postgres-auth:
    image: postgres:latest
    container_name: vaulted-postgres-auth
    platform: linux/amd64
    env_file:
      - apps/auth/.env
    environment:
      environment:
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AUTH_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5434:5432'
    volumes:
      - pgdata-auth:/var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_AUTH_USER} -d ${POSTGRES_AUTH_DB}',
        ]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    tty: true
    stdin_open: true
  rabbitmq:
    container_name: vaulted-rabbitmq
    image: rabbitmq:4.1.0-management
    platform: linux/amd64
    hostname: rabbitmq
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - rabbitmq:/var/lib/rabbitmq
    ports:
      - '15672:15672'
      - '5672:5672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  clamav-signatures:
    image: clamav/clamav:1.5
    container_name: vaulted-clamav-signatures
    platform: linux/amd64
    environment:
      - CLAMAV_NO_CLAMD=true
    volumes:
      - clamav-signatures:/var/lib/clamav
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'test -f /var/lib/clamav/main.cvd || test -f /var/lib/clamav/main.cld',
        ]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 60s
  clamd-1:
    image: clamav/clamav:1.5
    container_name: vaulted-clamd-1
    platform: linux/amd64
    environment:
      - CLAMAV_NO_FRESHCLAM=true
    volumes:
      - clamav-signatures:/var/lib/clamav
      - ./haproxy/clamd.conf:/etc/clamav/clamd.conf:ro
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'sh', '-c', 'echo PING | nc -w 1 127.0.0.1 3310 | grep PONG']
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 120s
    depends_on:
      clamav-signatures:
        condition: service_healthy
  clamd-2:
    image: clamav/clamav:1.5
    container_name: vaulted-clamd-2
    platform: linux/amd64
    environment:
      - CLAMAV_NO_FRESHCLAM=true
    volumes:
      - clamav-signatures:/var/lib/clamav
      - ./haproxy/clamd.conf:/etc/clamav/clamd.conf:ro
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'sh', '-c', 'echo PING | nc -w 1 127.0.0.1 3310 | grep PONG']
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 120s
    depends_on:
      clamav-signatures:
        condition: service_healthy
  haproxy:
    image: haproxy:3.1-alpine
    container_name: vaulted-haproxy
    platform: linux/amd64
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - '3310:3310'
      - '8404:8404'
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:8404/stats']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      clamd-1:
        condition: service_healthy
      clamd-2:
        condition: service_healthy

volumes:
  pgdata-auth:
    driver: local
  pgdata-files:
    driver: local
  rabbitmq:
    driver: local
  clamav-signatures:
    driver: local
