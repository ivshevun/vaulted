services:
  minio:
    image: minio/minio
    container_name: vaulted-minio-test
    platform: linux/amd64
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -f http://localhost:9000/minio/health/live || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  minio-init:
    image: minio/mc
    container_name: vaulted-minio-init-test
    platform: linux/amd64
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      mc mb myminio/vaulted-test-bucket --ignore-existing
      "
  api-gateway:
    restart: unless-stopped
    container_name: vaulted-api-gateway-test
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    env_file:
      - apps/api-gateway/.env.test
    ports:
      - '3002:3001'
    volumes:
      - ./apps:/usr/src/app/apps
      - ./libs:/usr/src/app/libs
      - ./e2e:/usr/src/app/e2e
      - ./.env.test:/usr/src/app/.env.test
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres-files:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      auth:
        condition: service_healthy
      files:
        condition: service_healthy
      antivirus:
        condition: service_healthy
  auth:
    restart: unless-stopped
    container_name: vaulted-auth-test
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./apps/auth/Dockerfile
    env_file:
      - apps/auth/.env.test
    ports:
      - '3012:3002'
    volumes:
      - ./apps/auth:/usr/src/app/apps/auth
      - ./libs:/usr/src/app/libs
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3002/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  files:
    restart: unless-stopped
    container_name: vaulted-files-test
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./apps/files/Dockerfile
    env_file:
      - apps/files/.env.test
    ports:
      - '3013:3003'
    volumes:
      - ./apps/files:/usr/src/app/apps/files
      - ./libs:/usr/src/app/libs
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3003/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres-files:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
  antivirus:
    restart: unless-stopped
    container_name: vaulted-antivirus-test
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./apps/antivirus/Dockerfile
    env_file:
      - apps/antivirus/.env.test
    ports:
      - '3014:3004'
    volumes:
      - ./apps/antivirus:/usr/src/app/apps/antivirus
      - ./libs:/usr/src/app/libs
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3004/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres-files:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      haproxy:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
  postgres-files:
    image: postgres:latest
    container_name: vaulted-postgres-files-test
    platform: linux/amd64
    env_file:
      - apps/files/.env.test
    environment:
      POSTGRES_USER: ${POSTGRES_FILES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_FILES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_FILES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5555:5432'
    volumes:
      - pgdata-files-test:/var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_FILES_USER} -d ${POSTGRES_FILES_DB}',
        ]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    tty: true
    stdin_open: true
  postgres-auth:
    image: postgres:latest
    container_name: vaulted-postgres-auth-test
    platform: linux/amd64
    env_file:
      - apps/auth/.env.test
    environment:
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AUTH_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5454:5432'
    volumes:
      - pgdata-auth-test:/var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_AUTH_USER} -d ${POSTGRES_AUTH_DB}',
        ]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    tty: true
    stdin_open: true
  rabbitmq:
    image: rabbitmq:4.1.0-management
    container_name: vaulted-rabbitmq-test
    platform: linux/amd64
    hostname: rabbitmq
    restart: always
    env_file:
      - .env.test
    volumes:
      - rabbitmq:/var/lib/rabbitmq
    ports:
      - '15673:15672'
      - '5673:5672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
  clamav-signatures:
    image: clamav/clamav:1.5
    container_name: vaulted-clamav-signatures-test
    platform: linux/amd64
    environment:
      - CLAMAV_NO_CLAMD=true
    volumes:
      - clamav-signatures:/var/lib/clamav
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'test -f /var/lib/clamav/main.cvd || test -f /var/lib/clamav/main.cld',
        ]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 60s
  clamd-1:
    image: clamav/clamav:1.5
    container_name: vaulted-clamd-1-test
    platform: linux/amd64
    environment:
      - CLAMAV_NO_FRESHCLAM=true
    volumes:
      - clamav-signatures:/var/lib/clamav
      - ./haproxy/clamd.conf:/etc/clamav/clamd.conf
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'sh', '-c', 'echo PING | nc -w 1 127.0.0.1 3310 | grep PONG']
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 120s
    depends_on:
      clamav-signatures:
        condition: service_healthy
  clamd-2:
    image: clamav/clamav:1.5
    container_name: vaulted-clamd-2-test
    platform: linux/amd64
    environment:
      - CLAMAV_NO_FRESHCLAM=true
    volumes:
      - clamav-signatures:/var/lib/clamav
      - ./haproxy/clamd.conf:/etc/clamav/clamd.conf
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'sh', '-c', 'echo PING | nc -w 1 127.0.0.1 3310 | grep PONG']
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 120s
    depends_on:
      clamav-signatures:
        condition: service_healthy
  haproxy:
    image: haproxy:3.1-alpine
    container_name: vaulted-haproxy-test
    platform: linux/amd64
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    ports:
      - '3310:3310'
      - '8404:8404'
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:8404/stats']
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 60s
    depends_on:
      clamd-1:
        condition: service_healthy
      clamd-2:
        condition: service_healthy

volumes:
  pgdata-auth-test:
    driver: local
  pgdata-files-test:
    driver: local
  rabbitmq:
    driver: local
  clamav-signatures:
    driver: local
